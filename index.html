<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Warmstart — AI 协作画像生成器</title>
<style>
  :root{--bg:#0f1117;--card:#1a1d27;--border:#2a2d3a;--text:#e1e4eb;--sub:#8b8fa3;--a1:#7c5cfc;--a2:#f59e0b;--a3:#10b981;--radius:14px}
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans SC','PingFang SC',sans-serif;line-height:1.6;min-height:100vh;display:flex;justify-content:center}
  .container{max-width:640px;width:100%;padding:30px 20px}
  .header{text-align:center;margin-bottom:10px;position:relative}
  .header h1{font-size:1.6rem;font-weight:700}
  .header p{color:var(--sub);font-size:0.9rem;margin-top:4px}
  .lang-switch{position:absolute;top:0;right:0;display:flex;gap:4px}
  .lang-switch button{padding:4px 10px;font-size:0.75rem;border:1px solid var(--border);border-radius:6px;background:transparent;color:var(--sub);cursor:pointer;transition:all 0.2s}
  .lang-switch button.active{background:var(--a1);color:#fff;border-color:var(--a1)}
  .progress{display:flex;gap:4px;margin-bottom:24px}
  .progress-dot{flex:1;height:4px;background:var(--border);border-radius:4px;transition:background 0.3s}
  .progress-dot.done{background:var(--a1)}.progress-dot.done.s2{background:var(--a2)}.progress-dot.done.s3{background:var(--a3)}
  .card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:32px 24px;animation:fadeIn 0.3s ease}
  @keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
  .badge{display:inline-block;padding:3px 12px;border-radius:20px;font-size:0.75rem;font-weight:600;margin-bottom:14px}
  .badge.s1{background:rgba(124,92,252,.12);color:var(--a1)}.badge.s2{background:rgba(245,158,11,.12);color:var(--a2)}.badge.s3{background:rgba(16,185,129,.12);color:var(--a3)}.badge.s0{background:rgba(124,92,252,.12);color:var(--a1)}
  .q-label{color:var(--sub);font-size:0.8rem;margin-bottom:12px}
  .q-title{font-size:1.1rem;font-weight:600;margin-bottom:20px;line-height:1.5}
  .privacy-note{color:var(--sub);font-size:0.78rem;background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:12px 14px;margin-bottom:20px;line-height:1.6}
  .warning-note{color:var(--a2);font-size:0.78rem;background:rgba(245,158,11,.08);border:1px solid rgba(245,158,11,.3);border-radius:10px;padding:12px 14px;margin-bottom:20px;line-height:1.6}
  .form-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px}
  .form-grid label{color:var(--sub);font-size:0.76rem;display:block;margin-bottom:4px}
  .form-grid input,.form-grid select{width:100%;background:var(--bg);border:1.5px solid var(--border);border-radius:8px;padding:10px;color:var(--text);font-size:0.9rem}
  .form-grid input:focus,.form-grid select:focus{outline:none;border-color:var(--a1)}
  .options{display:flex;flex-direction:column;gap:10px;margin-bottom:24px}
  .opt{background:var(--bg);border:1.5px solid var(--border);border-radius:10px;padding:14px 16px;cursor:pointer;transition:all 0.2s;font-size:0.9rem;line-height:1.5}
  .opt:hover{border-color:var(--a1)}.opt.picked{border-color:var(--a1);background:rgba(124,92,252,.06)}
  .opt.picked::after{content:" ✓";float:right;font-weight:700;color:var(--a1)}
  .opt.recommended{border-color:var(--a3);background:rgba(16,185,129,.04)}
  .rec-tag{display:inline-block;background:var(--a3);color:#fff;font-size:0.7rem;padding:2px 8px;border-radius:10px;margin-left:6px;font-weight:600}
  .mode-card{border:2px solid var(--border);border-radius:var(--radius);padding:22px 20px;cursor:pointer;transition:all 0.2s;margin-bottom:12px}
  .mode-card:hover{border-color:var(--a1)}.mode-card.picked{border-color:var(--a1);background:rgba(124,92,252,.04)}
  .mode-card .mode-title{font-size:1rem;font-weight:600;margin-bottom:4px}
  .mode-card .mode-desc{color:var(--sub);font-size:0.82rem;line-height:1.5}
  .fill-input{width:100%;background:var(--bg);border:1.5px solid var(--border);border-radius:10px;padding:14px;color:var(--text);font-size:0.9rem;font-family:inherit;resize:vertical;min-height:90px;margin-bottom:24px}
  .fill-input:focus{outline:none;border-color:var(--a3)}
  .fill-hint{color:var(--sub);font-size:0.78rem;background:var(--bg);border-radius:8px;padding:10px 12px;margin-bottom:20px;line-height:1.6}
  .nav{display:flex;justify-content:space-between;align-items:center;gap:12px}
  .btn{padding:11px 24px;border-radius:10px;border:none;font-size:0.88rem;font-weight:600;cursor:pointer;transition:all 0.2s;white-space:nowrap}
  .btn-next{background:var(--a1);color:#fff}.btn-next:hover{opacity:0.9}.btn-next.s2{background:var(--a2)}.btn-next.s3{background:var(--a3)}
  .btn-back{background:transparent;color:var(--sub);border:1px solid var(--border)}.btn-back:hover{border-color:var(--a1);color:var(--text)}
  .btn-skip{background:transparent;color:var(--sub);font-size:0.8rem;cursor:pointer;padding:8px;border:none}.btn-skip:hover{color:var(--text)}
  .result{display:none;animation:fadeIn 0.5s ease}.result.visible{display:block}
  .result h2{text-align:center;margin-bottom:14px;font-size:1.2rem}
  .prompt-box{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:22px;font-family:'SF Mono','Fira Code',monospace;font-size:0.82rem;line-height:1.8;white-space:pre-wrap;word-break:break-word;max-height:500px;overflow-y:auto;margin-bottom:18px}
  .actions{display:flex;gap:12px;flex-wrap:wrap}
  .btn-copy{background:var(--a3);color:#fff}.btn-copy:hover{opacity:0.9}
  .btn-reset{background:var(--card);color:var(--text);border:1px solid var(--border)}
  .toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);background:var(--a1);color:#fff;padding:12px 28px;border-radius:10px;font-weight:600;font-size:0.9rem;opacity:0;transition:opacity 0.3s;pointer-events:none;z-index:100}
  .toast.show{opacity:1}
  .footer{text-align:center;margin-top:32px;color:var(--sub);font-size:0.76rem}
  .footer a{color:var(--a1);text-decoration:none}
  @media(max-width:500px){.container{padding:18px 12px}.card{padding:20px 16px}.actions{flex-direction:column}.btn{width:100%;text-align:center}.form-grid{grid-template-columns:1fr}.lang-switch{position:static;justify-content:center;margin-top:8px}}
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>🧭 Warmstart</h1>
    <p data-t="tagline"></p>
    <div class="lang-switch">
      <button id="btnZh" class="active" onclick="switchLang('zh')">中文</button>
      <button id="btnEn" onclick="switchLang('en')">EN</button>
    </div>
  </div>
  <div class="progress" id="progress"></div>
  <div class="card" id="card"></div>
  <div class="result" id="result">
    <h2 data-t="resultTitle"></h2>
    <p style="text-align:center;color:var(--sub);margin-bottom:14px" data-t="resultHint"></p>
    <div class="prompt-box" id="promptBox"></div>
    <div class="actions">
      <button class="btn btn-copy" onclick="copyPrompt()" data-t="copyBtn"></button>
      <button class="btn btn-reset" onclick="resetAll()" data-t="resetBtn"></button>
    </div>
  </div>
  <div class="footer">
    <a href="https://github.com/diandian1001/ai-warmstart" target="_blank">GitHub</a> · <a href="PRIVACY.md" target="_blank">Privacy</a> · MIT · v0.7.1
  </div>
  <div class="toast" id="toast"></div>
</div>
<script src="ziwei.js"></script>
<script src="prompt.js"></script>

  backBtn: {zh:'← 返回',en:'← Back'},

function t(key){ return T[key] ? (T[key][uiLang] || key) : key; }

function switchLang(lang){
  uiLang = lang;
  document.documentElement.lang = lang === 'zh' ? 'zh-CN' : 'en';
  document.getElementById('btnZh').classList.toggle('active', lang==='zh');
  document.getElementById('btnEn').classList.toggle('active', lang==='en');
  try { localStorage.setItem('warmstart_uiLang', lang); } catch(e){}
  // Update static elements
  document.querySelectorAll('[data-t]').forEach(el => { el.textContent = t(el.dataset.t); });
  document.querySelector('title').textContent = lang==='zh' ? 'Warmstart — AI 协作画像生成器' : 'Warmstart — AI Collaboration Profile Generator';
  render();
}

// ========== State & Render (adapted for i18n) ==========
var step = 0, sceneId = null, birth = {}, universalAnswers = [], sceneAnswers = [];

function totalSteps(){ return mode === 'exp' ? 11 : 10; }

function sceneLabel(id){ var s=SCN[id]; return s ? (uiLang==='zh'?s.zh:s.en) : id; }
function sceneDesc(id){ var s=SCN[id]; return s ? (uiLang==='zh'?s.dzh:s.den) : ''; }

function render(){
  var total = totalSteps(), dots = '';
  for(var i=0;i<total;i++){
    var cls = i<step?'done':'', s2='', s3='';
    if(mode==='exp'){ if(i>=2&&i<=6)s2=' s2'; else if(i>=7)s3=' s3'; }
    else { if(i>=1&&i<=5)s2=' s2'; else if(i>=6)s3=' s3'; }
    dots += '<div class="progress-dot'+cls+s2+s3+'"></div>';
  }
  document.getElementById('progress').innerHTML = dots;
  if(step===0) renderMode();
  else if(mode==='exp'&&step===1) renderBirth();
  else if((mode==='exp'&&step===2)||(mode==='pro'&&step===1)) renderScenario();
  else {
    var offset = mode==='exp'?2:1;
    if(step>=offset+1&&step<=offset+5) renderUniversal(step-offset-1);
    else if(step>=offset+6&&step<=offset+9) renderSceneQ(step-offset-6);
    else showResult();
  }
}

function renderMode(){
  var c = document.getElementById('card');
  c.innerHTML = '<div class="badge s0">'+t('modeTitle')+'</div>'+
    '<div class="q-label">'+t('modeStep')+'</div>'+
    '<div class="q-title">'+t('modeQ')+'</div>'+
    '<div class="mode-card recommended" onclick="selectMode(\'pro\')" style="margin-bottom:14px">'+
      '<div class="mode-title">'+t('proTitle')+' <span class="rec-tag">'+t('proRec')+'</span></div>'+
      '<div class="mode-desc">'+t('proDesc')+'</div></div>'+
    '<div class="mode-card" onclick="selectMode(\'exp\')">'+
      '<div class="mode-title">'+t('expTitle')+'</div>'+
      '<div class="mode-desc">'+t('expDesc')+'</div></div>'+
    '<p style="color:var(--sub);font-size:0.78rem;text-align:center;margin-top:12px">'+t('modeHint')+'</p>';
}

function selectMode(m){ mode=m; step=1; birth={}; universalAnswers=[]; sceneAnswers=[]; sceneId=null; render(); }

function renderBirth(){
  var fv=function(id){return birth[id]||'';}, mO=['','1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
  var hO=BIRTH_FIELDS.find(function(f){return f.id==='hour'}).options;
  var mbO=BIRTH_FIELDS.find(function(f){return f.id==='mbti'}).options;
  var gO=BIRTH_FIELDS.find(function(f){return f.id==='gender'}).options;
  document.getElementById('card').innerHTML =
    '<div class="badge s1">'+t('birthBadge')+'</div>'+
    '<div class="q-label">'+t('birthStep')+'</div>'+
    '<div class="warning-note">'+t('birthWarning')+'</div>'+
    '<div class="privacy-note">'+t('birthPrivacy')+'</div>'+
    '<div class="form-grid">'+
      '<div><label>'+t('birthYear')+'</label><input type="number" placeholder="e.g. 1995" value="'+fv('year')+'" oninput="birth.year=this.value"></div>'+
      '<div><label>'+t('birthMonth')+'</label><select onchange="birth.month=this.value"><option value="">'+t('selectOpt')+'</option>'+mO.slice(1).map(function(m,i){return '<option value="'+(i+1)+'"'+(birth.month==i+1?' selected':'')+'>'+m+'</option>';}).join('')+'</select></div>'+
      '<div><label>'+t('birthDay')+'</label><input type="number" placeholder="1-31" min="1" max="31" value="'+fv('day')+'" oninput="birth.day=this.value"></div>'+
      '<div><label>'+t('birthHour')+'</label><select onchange="birth.hour=this.value">'+hO.map(function(h,i){return '<option value="'+i+'"'+(birth.hour==i?' selected':'')+'>'+h+'</option>';}).join('')+'</select></div>'+
      '<div><label>'+t('birthGender')+'</label><select onchange="birth.gender=this.value"><option value="">'+t('skipOpt')+'</option>'+gO.slice(1).map(function(g){return '<option value="'+g+'"'+(birth.gender===g?' selected':'')+'>'+g+'</option>';}).join('')+'</select></div>'+
      '<div><label>'+t('birthMbti')+'</label><select onchange="birth.mbti=this.value"><option value="">'+t('unknownOpt')+'</option>'+mbO.slice(1).map(function(m){return '<option value="'+m+'"'+(birth.mbti===m?' selected':'')+'>'+m+'</option>';}).join('')+'</select></div>'+
    '</div>'+
    '<div style="color:var(--sub);font-size:0.78rem;margin-bottom:20px;padding:8px 12px;background:var(--bg);border-radius:8px">'+t('birthHint')+'</div>'+
    '<div class="nav"><button class="btn btn-back" onclick="step=0;render()">'+t('backBtn')+'</button>'+
    '<span class="btn-skip" onclick="step=2;render()">'+t('skipAllBtn')+'</span>'+
    '<button class="btn btn-next" onclick="step=2;render()">'+t('nextBtn')+'</button></div>';
}

function renderScenario(){
  var stepNum = mode==='exp'?3:2;
  document.getElementById('card').innerHTML =
    '<div class="badge s2">'+t('sceneBadge')+'</div>'+
    '<div class="q-label">'+t('modeStep').replace('1',stepNum)+'</div>'+
    '<div class="q-title">'+t('sceneQ')+'<br><span style="font-size:0.85rem;color:var(--sub);font-weight:400">'+t('sceneHint')+'</span></div>'+
    '<div class="options">'+SCENARIOS.map(function(s){
      return '<div class="opt'+(sceneId===s.id?' picked':'')+'" onclick="selectScenario(\''+s.id+'\')">'+sceneLabel(s.id)+'<br><span style="font-size:0.8rem;color:var(--sub)">'+sceneDesc(s.id)+'</span></div>';
    }).join('')+'</div>'+
    '<div class="nav"><button class="btn btn-back" onclick="step='+(mode==='exp'?1:0)+';render()">'+t('backBtn')+'</button><span></span><span></span></div>';
}

function selectScenario(id){ sceneId=id; universalAnswers=[]; sceneAnswers=[]; step=(mode==='exp'?3:2); render(); }

function renderUniversal(idx){
  var q=UNIVERSAL_Q[idx], offset=mode==='exp'?3:2;
  document.getElementById('card').innerHTML =
    '<div class="badge s2">'+q.badge+'</div>'+
    '<div class="q-label">'+(uiLang==='zh'?'第':'Step ')+(offset+idx+1)+(uiLang==='zh'?' 步 · ':' · ')+t('genPref')+' '+(idx+1)+'/5</div>'+
    '<div class="q-title">'+q.q+'</div>'+
    '<div class="options">'+q.opts.map(function(o,i){
      return '<div class="opt'+(universalAnswers[idx]===i?' picked':'')+'" onclick="universalAnswers['+idx+']='+i+';step++;render()">'+o.t+'</div>';
    }).join('')+'</div>'+
    '<div class="nav"><button class="btn btn-back" onclick="step--;render()">'+t('prevBtn')+'</button>'+
    '<span class="btn-skip" onclick="universalAnswers['+idx+']=-1;step++;render()">'+t('skipBtn')+'</span><span></span></div>';
}

function renderSceneQ(idx){
  var qs=SCENE_Q[sceneId]; if(!qs||idx>=qs.length){showResult();return}
  var q=qs[idx], isFill=q.type==='fill', offset=mode==='exp'?8:7;
  document.getElementById('card').innerHTML =
    '<div class="badge s3">'+q.badge+'</div>'+
    '<div class="q-label">'+(uiLang==='zh'?'第':'Step ')+(offset+idx+1)+(uiLang==='zh'?' 步 · ':' · ')+q.badge+' '+(idx+1)+t('stepOf')+qs.length+(isFill?'':' (click to auto-advance)')+'</div>'+
    '<div class="q-title">'+q.q+'</div>'+
    (isFill ? '<textarea class="fill-input" id="fillInput" placeholder="'+(q.placeholder||'')+'" oninput="sceneAnswers['+idx+']=this.value">'+(sceneAnswers[idx]||'')+'</textarea>'+(
      q.examples?'<div class="fill-hint">💡 Examples: '+q.examples.map(function(e){return '"'+e+'"';}).join(', ')+'</div>':'')
    : '<div class="options">'+q.opts.map(function(o,i){
        return '<div class="opt'+(sceneAnswers[idx]===i?' picked':'')+'" onclick="sceneAnswers['+idx+']='+i+';step++;render()">'+o.t+'</div>';
      }).join('')+'</div>')+
    '<div class="nav"><button class="btn btn-back" onclick="step--;render()">'+t('prevBtn')+'</button>'+
    (!isFill&&idx<qs.length-1?'<span class="btn-skip" onclick="sceneAnswers['+idx+']=-1;step++;render()">'+t('skipBtn')+'</span>':'')+
    (isFill?'<button class="btn btn-next s3" onclick="step++;render()">'+(idx===qs.length-1?t('genBtn'):t('nextBtn'))+'</button>':'')+'</div>';
  if(isFill) document.getElementById('fillInput')&&document.getElementById('fillInput').focus();
}

function showResult(){
  document.getElementById('card').innerHTML='';
  document.getElementById('promptBox').textContent=buildPrompt();
  document.getElementById('result').classList.add('visible');
  document.getElementById('result').scrollIntoView({behavior:'smooth'});
  document.querySelectorAll('.progress-dot').forEach(function(el){el.classList.add('done')});
}

function copyPrompt(){
  var txt=document.getElementById('promptBox').textContent;
  try{navigator.clipboard.writeText(txt)}catch(e){var ta=document.createElement('textarea');ta.value=txt;document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta)}
  showToast(t('copied'));
}

function resetAll(){step=0;mode=null;sceneId=null;birth={};universalAnswers=[];sceneAnswers=[];document.getElementById('result').classList.remove('visible');render();}
function showToast(msg){var el=document.getElementById('toast');el.textContent=msg;el.classList.add('show');setTimeout(function(){el.classList.remove('show')},2500)}

// Restore saved language
(function(){
  var saved; try{saved=localStorage.getItem('warmstart_uiLang')}catch(e){saved=null}
  if(saved==='en') switchLang('en'); else switchLang('zh');
})();
</script>
</body>
</html>
